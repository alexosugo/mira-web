<svg width="1050" height="600" viewBox="0 0 1050 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mira Business Card Template — 3.5" x 2" at 300dpi (1050x600) -->
  <!-- FRONT -->
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#13243E"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="1050" height="600" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <!-- Background -->
    <rect width="1050" height="600" fill="url(#card-bg)"/>

    <!-- Subtle lime glow -->
    <circle cx="800" cy="150" r="300" fill="#C0DC2D" opacity="0.04"/>

    <!-- Logo icon -->
    <rect x="60" y="60" width="64" height="64" rx="12" fill="#C0DC2D"/>
    <path d="M73 106V74H80L88 94L96 74H103V106H99V82L92.5 100H83.5L77 82V106H73Z" fill="white"/>

    <!-- Name -->
    <text x="60" y="230" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.5" fill="white">{{NAME}}</text>

    <!-- Title -->
    <text x="60" y="272" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="18" font-weight="400" fill="#94adc9">{{TITLE}}</text>

    <!-- Divider -->
    <line x1="60" y1="310" x2="200" y2="310" stroke="#C0DC2D" stroke-width="2" opacity="0.6"/>

    <!-- Contact details -->
    <text x="60" y="370" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="16" font-weight="400" fill="#e0e7f0">{{EMAIL}}</text>
    <text x="60" y="400" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="16" font-weight="400" fill="#e0e7f0">{{PHONE}}</text>
    <text x="60" y="430" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="16" font-weight="500" fill="#C0DC2D">withmira.co</text>

    <!-- Made in Kenya -->
    <circle cx="60" cy="535" r="4" fill="#10b981"/>
    <text x="74" y="540" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="13" font-weight="500" fill="#6085ab">Made in Kenya</text>

    <!-- CMYK Reference (hidden in print, visible in template) -->
    <text x="660" y="540" font-family="'JetBrains Mono', monospace" font-size="10" fill="#456590">
      Navy: C90 M75 K80 | Lime: C20 Y90 | White: C0 M0 Y0 K0
    </text>
  </g>
</svg>
