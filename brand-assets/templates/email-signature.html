<!--
  Mira Email Signature Template
  Usage: Copy the HTML below into your email client's signature settings.
  Replace {{NAME}}, {{TITLE}}, {{EMAIL}}, {{PHONE}} with actual values.
-->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:'IBM Plex Sans',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;color:#13243E;">
  <tr>
    <td style="padding-right:16px;vertical-align:top;border-right:2px solid #C0DC2D;">
      <!-- Logo icon -->
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="width:48px;height:48px;background:#C0DC2D;border-radius:10px;text-align:center;vertical-align:middle;">
            <span style="font-family:'Bricolage Grotesque',Helvetica,Arial,sans-serif;font-size:24px;font-weight:700;color:#ffffff;line-height:48px;">M</span>
          </td>
        </tr>
      </table>
    </td>
    <td style="padding-left:16px;vertical-align:top;">
      <!-- Name & Title -->
      <div style="font-family:'Bricolage Grotesque',Helvetica,Arial,sans-serif;font-size:16px;font-weight:700;color:#13243E;margin-bottom:2px;">{{NAME}}</div>
      <div style="font-size:13px;color:#6085ab;margin-bottom:8px;">{{TITLE}} at <strong style="color:#13243E;">Mira</strong></div>

      <!-- Contact -->
      <table cellpadding="0" cellspacing="0" border="0" style="font-size:12px;color:#6085ab;">
        <tr>
          <td style="padding-right:12px;">
            <a href="mailto:{{EMAIL}}" style="color:#6085ab;text-decoration:none;">{{EMAIL}}</a>
          </td>
          <td style="padding-right:12px;border-left:1px solid #e7e5e4;padding-left:12px;">
            {{PHONE}}
          </td>
          <td style="border-left:1px solid #e7e5e4;padding-left:12px;">
            <a href="https://withmira.co" style="color:#C0DC2D;text-decoration:none;font-weight:600;">withmira.co</a>
          </td>
        </tr>
      </table>

      <!-- Tagline -->
      <div style="font-size:11px;color:#94adc9;margin-top:6px;font-style:italic;">Your Instagram DM Sales Assistant &middot; Made in Kenya</div>
    </td>
  </tr>
</table>
